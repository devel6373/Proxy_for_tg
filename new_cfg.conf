[Rule]

# ── 1. БЛОКИРОВКА ──────────────────────────────────────────

# Блокировка QUIC (UDP 443) — заставляет приложения использовать TCP,
# что необходимо для корректной работы через прокси
AND,((PROTOCOL,UDP),(DST-PORT,443)),REJECT

# Telegram anti-spinner (известный IP, вызывающий зависание)
IP-CIDR,95.161.76.100/31,REJECT,no-resolve

# Реклама
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Advertising/Advertising.list,REJECT
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Advertising/Advertising_Domain.list,REJECT

# Трекеры / приватность
