[Host]
# Apple-сервисы — через системный DNS (стабильность push и App Store)
*.apple.com = server:system
*.icloud.com = server:system
*.mzstatic.com = server:system

# Российские сервисы — через системный DNS провайдера
*.yandex.ru = server:system
*.yandex.net = server:system
*.vk.com = server:system
*.mail.ru = server:system
*.sberbank.ru = server:system
*.tinkoff.ru = server:system
*.gosuslugi.ru = server:system

localhost = 127.0.0.1


