[General]
bypass-system = true
ipv6 = false
prefer-ipv6 = false
private-ip-answer = true
dns-direct-system = false
dns-fallback-system = true
dns-direct-fallback-proxy = true
dns-server = https://dns.google/dns-query, https://1.1.1.1/dns-query, https://dns.adguard-dns.com/dns-query, https://dns.quad9.net/dns-query
