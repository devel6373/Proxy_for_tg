icmp-auto-reply = true
always-reject-url-rewrite = false

[Proxy Group]
# Основная группа для YouTube и соцсетей (быстрые серверы)
PROXY = url-test,policy-select-name=🇱🇻 ЛАТВИЯ,interval=300,tolerance=100,timeout=5,url=http://www.gstatic.com/generate_204,policy-regex-filter=(🇩🇪|🇳🇱|🇸🇪|🇫🇮|🇵🇱|🇪🇪|🇱🇻|🇫🇷|🇦🇹|🇩🇰|🇳🇴|🇬🇧|🇨🇿|🇱🇺)(?!.*(ADS|Torrent))
# Группа для ИИ (только совместимые страны)
AI = url-test,policy-select-name=🇳🇱 ⚡ НИДЕРЛАНДЫ,interval=600,tolerance=100,timeout=5,url=https://chat.openai.com/cdn-cgi/trace,policy-regex-filter=(🇩🇪|🇳🇱|🇫🇮|🇦🇹|🇩🇰|🇬🇧|🇮🇹|🇱🇺|🇨🇿)(?!.*(ADS|Torrent))

